<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Inscription</title>
    <link rel="stylesheet" href="inscrption.css">
    <link rel="stylesheet" href="insc.css"> 
</head>
<body>

<div class="container">

    <h2>Créer un compte</h2>

    <form method="POST" action="insc.php" >
        <label>Nom</label>
        <input type="text" placeholder="Entrez votre nom" required name="nom">

        <label>Email</label>
        <input type="email" placeholder="Entrez votre email" required name="Email">

        <label>Numéro de téléphone</label>
        <input type="tel" placeholder="Ex: 20 123 456" required name="num">

        <label>Mot de passe</label>
        <input type="password" placeholder="Entrez votre mot de passe" required name="pass">

        <input type="submit" value="S'inscrire">
    </form>
    <a href="home.html">Already have an account? click here</a>


</div>

</body>
</html>
