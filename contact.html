<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<header>
    <h1>📞 Contactez-nous</h1>
</header>

<section class="contact-container">

    <div class="card">
        <h2>📍 Adresse</h2>
        <p>Rue de l'Informatique, Sidi Henri, Tunis</p>
    </div>

    <div class="card">
        <h2>📧 Email</h2>
        <p>support@myshop.com</p>
    </div>

    <div class="card">
        <h2>📱 Téléphone</h2>
        <p>+216 12 345 678</p>
    </div>

    <div class="card">
        <h2>⏰ Horaires</h2>
        <p>Lundi - Samedi : 08h00 - 18h00</p>
    </div>

    <div class="card">
        <h2>🌐 Réseaux sociaux</h2>
        <p>Facebook | Instagram | WhatsApp</p>
    </div>

    <div class="card">
        <h2>📝 Message rapide</h2>
        <form>
            <input type="text" placeholder="Votre nom" required>
            <input type="email" placeholder="Votre email" required>
            <textarea placeholder="Votre message"></textarea>
            <button type="submit">Envoyer</button>
        </form>
    </div>

</section>

</body>
</html>
